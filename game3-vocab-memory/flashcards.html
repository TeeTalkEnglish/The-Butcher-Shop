<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥩 Meat Vocabulary Flashcards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f0eb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* ── BACK LINK ── */
        .back-link {
            align-self: flex-start;
            margin-bottom: 16px;
            color: #8B1A1A;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
        }
        .back-link:hover { text-decoration: underline; }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, #8B1A1A, #C0392B);
            color: white;
            width: 100%;
            max-width: 820px;
            border-radius: 16px;
            padding: 28px 24px;
            text-align: center;
            margin-bottom: 28px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        header h1 { font-size: 2em; margin-bottom: 6px; }
        header p { opacity: 0.85; font-size: 1em; }

        /* ── PROGRESS ── */
        .progress-wrap {
            width: 100%;
            max-width: 820px;
            margin-bottom: 22px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: #666;
            font-size: 0.88em;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8B1A1A, #e74c3c);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        /* ── FLASHCARD ── */
        .flashcard-wrap {
            width: 100%;
            max-width: 480px;
            perspective: 1200px;
            margin-bottom: 16px;
        }
        .flashcard {
            width: 100%;
            height: 390px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.65s ease;
            cursor: pointer;
        }
        .flashcard.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
        }

        /* Front */
        .card-front { background: white; }
        .card-front img {
            width: 100%;
            height: 270px;
            object-fit: cover;
            display: block;
        }
        .card-front-footer {
            padding: 18px;
            text-align: center;
        }
        .card-front-footer p {
            color: #aaa;
            font-size: 0.88em;
            margin-bottom: 4px;
        }
        .card-front-footer .big-emoji { font-size: 2em; }

        /* Back */
        .card-back {
            background: linear-gradient(145deg, #7B1010, #C0392B);
            color: white;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 28px;
            text-align: center;
        }
        .card-back .term { font-size: 2.6em; font-weight: 800; margin-bottom: 14px; }
        .card-back .definition { font-size: 1.1em; line-height: 1.6; opacity: 0.92; margin-bottom: 18px; }
        .card-back .example {
            background: rgba(255,255,255,0.18);
            border-radius: 10px;
            padding: 12px 18px;
            font-style: italic;
            font-size: 0.92em;
        }

        /* ── HINT ── */
        .hint {
            color: #999;
            font-size: 0.82em;
            margin-bottom: 18px;
            text-align: center;
        }

        /* ── CONTROLS ── */
        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 36px;
        }
        .btn {
            padding: 12px 30px;
            border: 2px solid #C0392B;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 700;
            background: white;
            color: #C0392B;
            transition: all 0.2s;
        }
        .btn:hover:not(:disabled) { background: #C0392B; color: white; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .counter { font-weight: 700; color: #555; min-width: 55px; text-align: center; font-size: 1.05em; }

        /* ── GRID ── */
        .grid-section { width: 100%; max-width: 820px; }
        .grid-section h2 {
            text-align: center;
            color: #444;
            margin-bottom: 18px;
            font-size: 1.15em;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 14px;
        }
        .mini-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 3px solid transparent;
        }
        .mini-card:hover { transform: translateY(-4px); box-shadow: 0 8px 22px rgba(0,0,0,0.15); }
        .mini-card.active { border-color: #C0392B; }
        .mini-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
        .mini-info { padding: 10px 12px; }
        .mini-info .mini-term { font-weight: 700; color: #222; font-size: 0.97em; }
        .mini-info .mini-def { color: #888; font-size: 0.78em; margin-top: 3px; line-height: 1.4; }

        /* Seen badge */
        .mini-card.seen::after {
            content: "✓";
            position: absolute;
            top: 6px;
            right: 8px;
            background: #27ae60;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }
        .mini-card { position: relative; }
    </style>
</head>
<body>

<a class="back-link" href="/">← Back to TeeTalkEnglish</a>

<header>
    <h1>🥩 Meat Vocabulary Flashcards</h1>
    <p>Australian Butcher Shop · Click a card to flip · Use ← → keys to navigate</p>
</header>

<!-- Progress -->
<div class="progress-wrap">
    <div class="progress-info">
        <span id="progressText">Card 1 of 9</span>
        <span id="progressPercent">11%</span>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:11%"></div>
    </div>
</div>

<!-- Main Flashcard -->
<div class="flashcard-wrap">
    <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-front">
            <img id="cardImage" src="" alt="meat"
                 onerror="this.style.display='none'; this.nextElementSibling.style.fontSize='80px'">
            <div class="card-front-footer">
                <p>👆 Click to reveal the term!</p>
                <div class="big-emoji" id="frontEmoji">🥩</div>
            </div>
        </div>
        <div class="card-back">
            <div class="term" id="cardTerm"></div>
            <div class="definition" id="cardDefinition"></div>
            <div class="example" id="cardExample"></div>
        </div>
    </div>
</div>

<p class="hint">🖱️ Click card to flip &nbsp;|&nbsp; ← → Arrow keys to navigate &nbsp;|&nbsp; Space to flip</p>

<!-- Navigation -->
<div class="controls">
    <button class="btn" id="prevBtn" onclick="prevCard()" disabled>◀ Prev</button>
    <span class="counter" id="counter">1 / 9</span>
    <button class="btn" id="nextBtn" onclick="nextCard()">Next ▶</button>
</div>

<!-- All Cards Grid -->
<div class="grid-section">
    <h2>📋 All Cards — Click any to jump to it</h2>
    <div class="card-grid" id="cardGrid"></div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────
const cards = [
    {
        term: "Snags",
        definition: "Sausages (Australian slang)",
        example: "\"Grab some snags for the barbie, mate!\"",
        emoji: "🌭",
        image: "images/snags.jpg"
    },
    {
        term: "Mince",
        definition: "Ground / minced meat (beef mince = ground beef)",
        example: "\"I need 500g of beef mince for the bolognese.\"",
        emoji: "🍖",
        image: "images/mince.jpg"
    },
    {
        term: "Rashers",
        definition: "Slices of bacon",
        example: "\"Can I get six rashers of bacon, please?\"",
        emoji: "🥓",
        image: "images/rashers.jpg"
    },
    {
        term: "Scotch Fillet",
        definition: "Ribeye steak — a premium beef cut with rich marbling",
        example: "\"Two scotch fillets for dinner tonight!\"",
        emoji: "🥩",
        image: "images/scotch-fillet.jpg"
    },
    {
        term: "Chops",
        definition: "Meat cut from the rib or loin (lamb chops, pork chops)",
        example: "\"Four lamb chops, please — nice and thick.\"",
        emoji: "🍗",
        image: "images/chops.jpg"
    },
    {
        term: "Fillet",
        definition: "Boneless cut of meat or fish",
        example: "\"I'd like a salmon fillet, skin off please.\"",
        emoji: "🐟",
        image: "images/fillet.jpg"
    },
    {
        term: "Brekkie",
        definition: "Breakfast (Australian slang)",
        example: "\"We had rashers and snags for brekkie!\"",
        emoji: "🍳",
        image: "images/brekkie.jpg"
    },
    {
        term: "Sausage Sizzle",
        definition: "BBQ fundraiser selling sausages in bread — a Bunnings tradition!",
        example: "\"There's a sausage sizzle at Bunnings today!\"",
        emoji: "🍞",
        image: "images/sausage-sizzle.jpg"
    },
    {
        term: "Barbie",
        definition: "BBQ / barbecue (Australian slang)",
        example: "\"Throw another snag on the barbie!\"",
        emoji: "🔥",
        image: "images/barbie.jpg"
    }
];

// ── STATE ────────────────────────────────────────────────
let current = 0;
let isFlipped = false;
const seen = new Set();

// ── LOAD CARD ────────────────────────────────────────────
function loadCard(index, animate = true) {
    const card = cards[index];
    const el = document.getElementById('flashcard');

    if (animate) {
        el.style.opacity = '0';
        el.style.transform = 'scale(0.95)';
        setTimeout(() => {
            el.style.transition = 'opacity 0.25s, transform 0.25s';
            el.style.opacity = '1';
            el.style.transform = 'scale(1)';
        }, 50);
    }

    // Reset flip
    el.classList.remove('flipped');
    isFlipped = false;

    // Set image + content
    document.getElementById('cardImage').src = card.image;
    document.getElementById('cardImage').style.display = 'block';
    document.getElementById('frontEmoji').textContent = card.emoji;
    document.getElementById('cardTerm').textContent = card.emoji + '  ' + card.term;
    document.getElementById('cardDefinition').textContent = card.definition;
    document.getElementById('cardExample').textContent = card.example;

    // Progress
    const pct = Math.round(((index + 1) / cards.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Card ${index + 1} of ${cards.length}`;
    document.getElementById('progressPercent').textContent = pct + '%';
    document.getElementById('counter').textContent = `${index + 1} / ${cards.length}`;

    // Buttons
    document.getElementById('prevBtn').disabled = index === 0;
    document.getElementById('nextBtn').disabled = index === cards.length - 1;

    // Mini grid highlight
    document.querySelectorAll('.mini-card').forEach((el, i) => {
        el.classList.toggle('active', i === index);
    });
}



function flipCard() {
    const el = document.getElementById('flashcard');
    el.classList.toggle('flipped');
    isFlipped = !isFlipped;
    if (isFlipped) {
        seen.add(current);
        const mini = document.querySelectorAll('.mini-card')[current];
        if (mini) mini.classList.add('seen');
    }
}

function nextCard() {
    if (current < cards.length - 1) { current++; loadCard(current); }
}
function prevCard() {
    if (current > 0) { current--; loadCard(current); }
}

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') nextCard();
    if (e.key === 'ArrowLeft')  prevCard();
    if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// ── BUILD MINI GRID ──────────────────────────────────────
function buildGrid() {
    const grid = document.getElementById('cardGrid');
    cards.forEach((card, i) => {
        const div = document.createElement('div');
        div.className = 'mini-card' + (i === 0 ? ' active' : '');
        div.innerHTML = `
            <img src="${card.image}" alt="${card.term}"
                 onerror="this.style.height='60px';this.style.fontSize='2em';this.alt='${card.emoji}'">
            <div class="mini-info">
                <div class="mini-term">${card.emoji} ${card.term}</div>
                <div class="mini-def">${card.definition}</div>
            </div>`;
        div.onclick = () => { current = i; loadCard(i); };
        grid.appendChild(div);
    });
}

buildGrid();
loadCard(0, false);
</script>
</body>
</html>
